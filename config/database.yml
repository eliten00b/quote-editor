default: &default
  adapter: postgresql
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  port: 5436

development:
  <<: *default
  database: quote_editor_development

test:
  <<: *default
  database: quote_editor_test

production:
  primary: &primary_production
    <<: *default
    database: quote_editor_production
    username: quote_editor
    password: <%= ENV["QUOTE_EDITOR_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: quote_editor_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: quote_editor_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: quote_editor_production_cable
    migrations_paths: db/cable_migrate
